services:
  log_analyzer:
    build:
      context: ./
      dockerfile: ./Dockerfile
    env_file: ./.env
    restart: unless-stopped
    ports:
      - ${API_SERVER_PORT}:8080
    volumes:
      - type: bind
        source: ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/log_analyzer
        target: /app/volumes/log_analyzer
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  mysql:
    image: mariadb:11.5
    restart: unless-stopped
    ports:
      - ${MYSQL_PORT}:3306
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/store:/var/lib/mysql
      - ./app/static/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    mem_limit: 512m
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - PMA_ARBITRARY=1
      - PMA_HOST=${PMA_HOST}
      - PMA_PORT=${PMA_PORT}
      - PMA_USER=${PMA_USER}
      - PMA_PASSWORD=${PMA_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 20s
      retries: 10

  mysql-admin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    profiles: ["admin"]
    ports:
      - ${PMA_GUI_PORT}:80
    mem_limit: 512m
    depends_on:
      - mysql
    environment:
      - PMA_HOST=${PMA_HOST}
      - PMA_PORT=${PMA_PORT}
      - PMA_USER=${PMA_USER}
      - PMA_PASSWORD=${PMA_PASSWORD}

networks:
  default:
    name: log_analyzer_net
